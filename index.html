<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f766e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HealthGuard"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>HealthGuard</title>
  <link rel="stylesheet" href="app.css"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;margin:0}
    .serif{font-family:Georgia,'Times New Roman',serif}

    /* animated gradient bg */
    .grad{
      background:linear-gradient(135deg,#0f766e 0%,#0891b2 50%,#134e4a 100%);
      background-size:300% 300%;
      animation:gs 10s ease infinite;
    }
    @keyframes gs{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

    .blob{position:absolute;border-radius:50%;filter:blur(72px);opacity:.13;animation:fl 7s ease-in-out infinite}
    @keyframes fl{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

    /* tabs */
    .tab{transition:all .2s;border-radius:8px;padding:8px 0;font-weight:600;font-size:.875rem;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.65)}
    .tab.on{background:white;color:#0f766e;box-shadow:0 2px 8px rgba(0,0,0,.12)}

    /* input */
    .inp{display:block;width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:16px;outline:none;font-family:inherit;background:#fafafa;transition:border-color .2s}
    .inp:focus{border-color:#0f766e;background:#fff}
    .inp-wrap{position:relative}
    .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;font-size:1rem;line-height:1;background:none;border:none;padding:0}
    .eye:hover{color:#0f766e}

    /* role card */
    .rc{cursor:pointer;border:2px solid #e2e8f0;border-radius:12px;padding:12px;text-align:center;transition:all .15s}
    .rc:hover{border-color:#0d9488;transform:translateY(-2px)}
    .rc.sel{border-color:#0d9488;background:#ccfbf1}

    /* primary button */
    .btn-p{display:block;width:100%;background:linear-gradient(135deg,#0f766e,#0891b2);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s}
    .btn-p:hover{opacity:.9;transform:translateY(-1px)}
    .btn-p:active{transform:translateY(0)}

    /* alert messages */
    .msg{border-radius:8px;padding:9px 13px;font-size:.8rem;font-weight:500;margin-bottom:12px}
    .msg-err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .msg-ok {background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

    /* pw strength */
    #sBar{height:4px;border-radius:4px;transition:width .3s,background .3s;width:0}

    /* fade-in */
    .pane{animation:fi .25s ease}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden p-4">

  <div class="grad absolute inset-0 -z-10"></div>
  <div class="blob w-72 h-72 bg-teal-300"   style="top:-60px;left:-60px"></div>
  <div class="blob w-96 h-96 bg-cyan-400"   style="bottom:-40px;right:-40px;animation-delay:3s"></div>
  <div class="blob w-56 h-56 bg-emerald-400" style="top:45%;left:35%;animation-delay:1.5s"></div>

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden relative z-10">

    <!-- header band -->
    <div class="grad px-8 pt-7 pb-6 text-white text-center">
      <div class="flex items-center justify-center gap-2 mb-1">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0
               00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="serif text-3xl">HealthGuard</span>
      </div>
      <p class="text-teal-100 text-sm">Your personal health companion</p>

      <!-- tab strip -->
      <div class="flex gap-1 mt-5 bg-white/20 rounded-xl p-1">
        <button id="tLogin"  class="tab on flex-1" onclick="goTab('login')">Sign In</button>
        <button id="tSignup" class="tab    flex-1" onclick="goTab('signup')">Create Account</button>
      </div>
    </div>

    <!-- body -->
    <div class="px-8 py-7">

      <!-- ====== LOGIN ====== -->
      <div id="pLogin" class="pane">
        <div id="lMsg"></div>
        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Email</label>
        <input id="lEmail" type="email" class="inp mb-3" placeholder="you@example.com"/>

        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Password</label>
        <div class="inp-wrap mb-5">
          <input id="lPass" type="password" class="inp pr-10" placeholder="Your password"/>
          <button class="eye" onclick="toggleEye('lPass',this)">👁</button>
        </div>

        <button class="btn-p" onclick="doLogin()">Sign In →</button>
        <p class="text-center text-xs text-gray-400 mt-4">
          Don't have an account?
          <button onclick="goTab('signup')" class="text-teal-600 font-semibold hover:underline">Create one</button>
        </p>
      </div>

      <!-- ====== SIGNUP ====== -->
      <div id="pSignup" class="pane hidden">
        <div id="sMsg"></div>

        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Full Name</label>
        <input id="sName" type="text" class="inp mb-3" placeholder="John Doe"/>

        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Email</label>
        <input id="sEmail" type="email" class="inp mb-3" placeholder="you@example.com"/>

        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Password</label>
        <div class="inp-wrap mb-1">
          <input id="sPass" type="password" class="inp pr-10" placeholder="Min. 6 characters"
                 oninput="checkStrength(this.value)"/>
          <button class="eye" onclick="toggleEye('sPass',this)">👁</button>
        </div>
        <div class="h-1 bg-gray-100 rounded-full overflow-hidden mb-1">
          <div id="sBar"></div>
        </div>
        <p id="sBarLabel" class="text-xs text-gray-400 mb-3"></p>

        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Confirm Password</label>
        <div class="inp-wrap mb-4">
          <input id="sConf" type="password" class="inp pr-10" placeholder="Repeat password"/>
          <button class="eye" onclick="toggleEye('sConf',this)">👁</button>
        </div>

        <label class="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">I am a…</label>
        <div class="grid grid-cols-2 gap-2 mb-5">
          <div class="rc" id="rcPat" onclick="pickRole('patient')">
            <div class="text-2xl mb-1">🧑‍⚕️</div>
            <p class="font-semibold text-gray-700 text-sm">Patient</p>
          </div>
          <div class="rc" id="rcCG" onclick="pickRole('caregiver')">
            <div class="text-2xl mb-1">👩‍👦</div>
            <p class="font-semibold text-gray-700 text-sm">Caregiver</p>
          </div>
        </div>

        <button class="btn-p" onclick="doSignup()">Create Account →</button>
        <p class="text-center text-xs text-gray-400 mt-4">
          Already have an account?
          <button onclick="goTab('login')" class="text-teal-600 font-semibold hover:underline">Sign in</button>
        </p>
      </div>

    </div>
    <p class="text-center text-xs text-gray-300 pb-5">HealthGuard · Demo Build</p>
  </div>

  <script src="js/storage.js"></script>
  <script>
    /* ----- tab switching ----- */
    let pickedRole = null;

    function goTab(t) {
      const isLogin = t === 'login';
      document.getElementById('pLogin').classList.toggle('hidden', !isLogin);
      document.getElementById('pSignup').classList.toggle('hidden', isLogin);
      document.getElementById('tLogin').classList.toggle('on', isLogin);
      document.getElementById('tSignup').classList.toggle('on', !isLogin);
      document.getElementById('lMsg').innerHTML = '';
      document.getElementById('sMsg').innerHTML = '';
    }

    /* ----- role selection ----- */
    function pickRole(r) {
      pickedRole = r;
      document.getElementById('rcPat').classList.toggle('sel', r === 'patient');
      document.getElementById('rcCG').classList.toggle('sel', r === 'caregiver');
    }

    /* ----- eye toggle ----- */
    function toggleEye(id, btn) {
      const inp = document.getElementById(id);
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    /* ----- password strength ----- */
    function checkStrength(pw) {
      let s = 0;
      if (pw.length >= 6)          s++;
      if (pw.length >= 10)         s++;
      if (/[A-Z]/.test(pw))        s++;
      if (/[0-9]/.test(pw))        s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      const cfg = [
        { w:'0%',   bg:'',             lbl:'' },
        { w:'20%',  bg:'#f87171',      lbl:'Weak' },
        { w:'45%',  bg:'#fb923c',      lbl:'Fair' },
        { w:'70%',  bg:'#facc15',      lbl:'Good' },
        { w:'88%',  bg:'#34d399',      lbl:'Strong' },
        { w:'100%', bg:'#10b981',      lbl:'💪 Very strong' }
      ][s];
      const b = document.getElementById('sBar');
      b.style.width = cfg.w; b.style.background = cfg.bg;
      document.getElementById('sBarLabel').textContent = cfg.lbl;
    }

    /* ----- show message ----- */
    function msg(elId, text, ok) {
      document.getElementById(elId).innerHTML =
        '<div class="msg ' + (ok ? 'msg-ok' : 'msg-err') + '">' + text + '</div>';
    }

    /* ----- LOGIN ----- */
    function doLogin() {
      const email = document.getElementById('lEmail').value.trim();
      const pass  = document.getElementById('lPass').value;
      if (!email || !pass) { msg('lMsg','Please enter your email and password.',false); return; }

      const r = Storage.login(email, pass);
      if (!r.ok) { msg('lMsg', r.msg, false); return; }

      // patient: ensure record exists
      if (r.user.role === 'patient') Storage.ensurePatientRecord(r.user);
      msg('lMsg', 'Welcome back, ' + r.user.name + '! Redirecting…', true);
      setTimeout(() => {
        window.location.href = r.user.role === 'patient' ? 'patient.html' : 'caregiver.html';
      }, 600);
    }

    /* ----- SIGN UP ----- */
    function doSignup() {
      const name  = document.getElementById('sName').value.trim();
      const email = document.getElementById('sEmail').value.trim();
      const pass  = document.getElementById('sPass').value;
      const conf  = document.getElementById('sConf').value;

      if (!name)             { msg('sMsg','Please enter your name.',false);              return; }
      if (!email)            { msg('sMsg','Please enter your email.',false);             return; }
      if (pass.length < 6)   { msg('sMsg','Password must be at least 6 characters.',false); return; }
      if (pass !== conf)     { msg('sMsg','Passwords do not match.',false);              return; }
      if (!pickedRole)       { msg('sMsg','Please select a role.',false);               return; }

      const r = Storage.register(name, email, pass, pickedRole);
      if (!r.ok) { msg('sMsg', r.msg, false); return; }

      // show success then redirect to LOGIN tab (user must sign in)
      msg('sMsg', '✅ Account created! Please sign in with your credentials.', true);
      setTimeout(() => {
        // pre-fill email on login tab
        document.getElementById('lEmail').value = email;
        goTab('login');
      }, 1500);
    }

    /* ----- init ----- */
    (function() {
      // Register service worker only when served via HTTP (not file://)
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
      // if session already valid, bounce to dashboard
      const u = Storage.currentUser();
      if (u) window.location.href = u.role === 'patient' ? 'patient.html' : 'caregiver.html';

      // enter key
      document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (!document.getElementById('pLogin').classList.contains('hidden')) doLogin();
        else doSignup();
      });

      // check if came from signup (pre-fill email param)
      const params = new URLSearchParams(location.search);
      if (params.get('tab') === 'login') goTab('login');
    })();
  </script>
</body>
</html>
